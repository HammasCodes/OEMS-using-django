<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Office Employee Management System</title>

    <style>
      body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(to right, #6a11cb, #2575fc);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }
      .container {
        max-width: 500px;
        background: #ffffff;
        color: #343a40;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 20px;
        font-weight: bold;
      }
      hr {
        border-top: 2px solid #6c757d;
        margin: 20px 0;
      }
      .btn {
        width: 100%;
        margin: 10px 0;
        font-size: 1rem;
        padding: 10px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }
      footer {
        text-align: center;
        margin-top: 20px;
        color: #f8f9fa;
      }
      footer a {
        color: #f8f9fa;
        text-decoration: none;
        font-weight: bold;
      }
      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Office Employee Management System</h1>
      <hr>
      <a class="btn btn-primary" href="/all_emp" role="button">View All Employees</a>
      <a class="btn btn-success" href="/add_emp" role="button">Add An Employee</a>
      <a class="btn btn-danger" href="/remove_emp" role="button">Remove An Employee</a>
      <a class="btn btn-info" href="/filter_emp" role="button">Filter Employee Details</a>
    </div>
    <footer>
      <p>Powered by <a href="https://www.linkedin.com/in/mohammad-hammas-426062233/">Mohammad Hammas</a></p>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  </body>
</html>
